apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "tatara-memory-repo-ingester.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-memory-repo-ingester.labels" . | nindent 4 }}
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "tatara-memory-repo-ingester.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          # The Go analyzer shells out to `go list`/`packages.Load`, which needs
          # writable HOME (GOCACHE / build cache) and TMPDIR. With a read-only
          # root filesystem these must point at writable emptyDir mounts.
          env:
            - name: HOME
              value: /home/cache
            - name: GOCACHE
              value: /home/cache/go-build
            - name: GOPATH
              value: /home/cache/go
            - name: XDG_CACHE_HOME
              value: /home/cache/.cache
            - name: TMPDIR
              value: /tmp
          envFrom:
            - configMapRef:
                name: {{ include "tatara-memory-repo-ingester.fullname" . }}
            {{- if .Values.existingSecret }}
            - secretRef:
                name: {{ .Values.existingSecret }}
            {{- end }}
          volumeMounts:
            - name: cache
              mountPath: /home/cache
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
