name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    uses: szymonrychu/tatara-operator/.github/workflows/ci-shared.yml@main
    with:
      runner-label: tatara-memory-repo-ingester
      smoke-binary: ./bin/tatara-ingest
      build-needs-cgo: true
      has-chart: true
    secrets: inherit
