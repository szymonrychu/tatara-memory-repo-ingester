name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  secscan:
    runs-on: tatara-memory-repo-ingester
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xzf - gitleaks
          ./gitleaks detect --source . --no-git --redact --verbose

  lint:
    runs-on: tatara-memory-repo-ingester
    steps:
      - uses: actions/checkout@v4
      - name: build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - name: pre-commit
        run: pre-commit run --all-files

  test:
    runs-on: tatara-memory-repo-ingester
    steps:
      - uses: actions/checkout@v4
      - name: build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - run: mise run test

  build:
    runs-on: tatara-memory-repo-ingester
    needs: [secscan, lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - run: mise run build

  smoke:
    runs-on: tatara-memory-repo-ingester
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - name: smoke
        run: |
          mise run build
          ./bin/tatara-ingest --help || true

  image:
    if: ${{ github.event_name == 'push' }}
    runs-on: tatara-memory-repo-ingester
    needs: [secscan, lint, test, build]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install buildctl
        run: |
          curl -sSfL "https://github.com/moby/buildkit/releases/download/v0.18.2/buildkit-v0.18.2.linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local bin/buildctl
      - name: build and push image
        run: bash .github/ci/build.sh "${{ github.event.repository.name }}"
