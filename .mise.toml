min_version = "2026.6.3"

[tools]
go = "1.25.0"
golangci-lint = "2.12.2"
pre-commit = "4.6.0"

[hooks]
postinstall = ["pre-commit install --hook-type pre-commit --hook-type pre-push || true"]

[env]
GOFLAGS = "-count=1"
CGO_ENABLED = "1"

[tasks.lint]
run = "make lint"

[tasks.test]
run = "make test"

[tasks.build]
run = "make build"
